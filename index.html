<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Analytics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Weather Analytics & Decision Support</h1>
        
        <div class="search-section">
            <input type="text" id="cityInput" placeholder="Enter city name" class="city-input">
            <button id="searchBtn" class="search-btn">Get Weather</button>
        </div>
        
        <div id="result" class="weather-result">
            <p class="placeholder">Enter a city to see weather information</p>
        </div>
        
        <button id="itineraryBtn" class="itinerary-btn" style="display: none;">Plan Your Trip</button>
    </div>
    
    <script src="weather.js"></script>
</body>
</html>
